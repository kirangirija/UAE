services:
  - type: web
    name: uae-real-estate-dashboard
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python app/db/seed.py"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
